name: Docker Build and Push to DockerHub (CD)

on:
  push:
    branches: ["main"]

jobs:
  automated-tests:
    name: Run Code Quality and Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and project dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv
          uv sync
          uv pip install ruff pytest pytest-mock pydantic-settings httpx

      - name: Run Ruff Linter Check
        run: |
          uv run ruff check .

      - name: Run Automated Tests with Pytest
        env:
          GROQ_API_KEY: "gsk_github_actions_pipeline_test_placeholder_98765"
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend/src
          uv run pytest -v

  build-and-push:
    name: Push Docker Images to DockerHub
    runs-on: ubuntu-latest
    needs: automated-tests

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      # 🚨 TRUCO DE INYECCIÓN LOCAL: Copiamos las dependencias a las subcarpetas para DockerHub
      - name: Sync dependencies for sub-services
        run: |
          cp pyproject.toml uv.lock ./backend/
          cp pyproject.toml uv.lock ./frontend/

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend (FastAPI)
        uses: docker/build-push-action@v5
        with:
          # Volvemos a aislar el contexto a su propia carpeta
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: seba39399/biomedical-rag-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend (Streamlit)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: seba39399/biomedical-rag-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-aws:
    name: Deploy Infrastructure to AWS ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      # 🚨 TRUCO DE INYECCIÓN LOCAL: Copiamos las dependencias para que AWS CDK las encuentre en su build context aislado
      - name: Sync dependencies for CDK assets
        run: |
          cp pyproject.toml uv.lock ./backend/
          cp pyproject.toml uv.lock ./frontend/

      - name: Set up Node.js (Para el CDK)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv pip install --system aws-cdk-lib constructs

      - name: AWS CDK Deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-1"
          JSII_SILENCE_WARNING_UNTESTED_NODE_VERSION: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd infrastructure
          cdk deploy --require-approval never
