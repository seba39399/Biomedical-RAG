name: Docker Build and Push to DockerHub (CD)

on:
  push:
    branches: ["main"]

jobs:
  automated-tests:
    name: Run Code Quality and Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and project dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv venv
          uv sync

      - name: Run Ruff Linter Check
        run: |
          uv run ruff check .

      - name: Run Automated Tests with Pytest
        env:
          GROQ_API_KEY: "gsk_github_actions_pipeline_test_placeholder_98765"
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend/src
          uv run pytest -v

  build-and-push:
    name: Push Docker Images to DockerHub
    runs-on: ubuntu-latest
    needs: automated-tests

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend (FastAPI)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: seba39399/biomedical-rag-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend (Streamlit)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: seba39399/biomedical-rag-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
