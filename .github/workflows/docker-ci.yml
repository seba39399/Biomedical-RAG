name: 🚀 Docker Build and Push to DockerHub (CD)

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    name: Compilar y Subir Imágenes a DockerHub
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout del código
        uses: actions/checkout@v4

      # CORRECCIÓN AQUÍ: Cambiados los :: por . para la sintaxis correcta de GitHub
      - name: 🔑 Iniciar sesión en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso Backend
      - name: 📦 Build & Push Backend (FastAPI)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: seba39399/biomedical-rag-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Paso Frontend
      - name: 📦 Build & Push Frontend (Streamlit)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: seba39399/biomedical-rag-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
