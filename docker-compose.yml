version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - API_V1_STR=/api/v1
      - GROQ_API_KEY=${GROQ_API_KEY}
      - VECTOR_DB_DIR=/app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - rag-network

volumes:
  chroma_data:

networks:
  rag-network:
    driver: bridge
