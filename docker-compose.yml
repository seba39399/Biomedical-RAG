services:
  backend:
    image: seba39399/biomedical-rag-backend:latest
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - rag_network
    restart: always

  frontend:
    image: seba39399/biomedical-rag-frontend:latest
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    networks:
      - rag_network
    restart: always

networks:
  rag_network:
    driver: bridge
